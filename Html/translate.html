<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .logo {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        
        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .translator-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .translator-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .translator-title i {
            color: #3498db;
        }
        
        .translator-controls {
            display: grid;
            grid-template-columns: 1fr 50px 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .language-selector {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            transition: border-color 0.3s;
            cursor: pointer;
        }
        
        .language-selector:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .swap-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #3498db;
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .swap-button:hover {
            background: #2980b9;
            transform: rotate(180deg);
        }
        
        .text-area-container {
            position: relative;
        }
        
        .text-area {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            background: white;
            transition: border-color 0.3s;
        }
        
        .text-area:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .char-count {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 12px;
            color: #666;
            background: rgba(255,255,255,0.9);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .translate-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 10px;
            width: 100%;
        }
        
        .translate-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .translate-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .content-section {
            padding: 30px;
        }
        
        .content-title {
            font-size: 2em;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        .content-text {
            font-size: 1.1em;
            color: #444;
            margin-bottom: 20px;
            text-align: justify;
        }
        
        .highlight {
            background: linear-gradient(120deg, #a8edea 0%, #fed6e3 100%);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 500;
        }
        
        .footer {
            background: #2c3e50;
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }
        
        .social-links a {
            color: white;
            font-size: 24px;
            transition: color 0.3s;
        }
        
        .social-links a:hover {
            color: #3498db;
        }
        
        .copyright {
            opacity: 0.8;
            font-size: 14px;
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .translator-controls {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
            
            .swap-button {
                justify-self: center;
            }
            
            body {
                padding: 10px;
            }
            
            .container {
                border-radius: 15px;
            }
        }
        
        .hidden {
            display: none;
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
        </header>
        
        <section class="translator-section">
            <h2 class="translator-title">
                <i class="fas fa-language"></i> Smart Translator
            </h2>
            
            <div class="translator-controls">
                <select id="sourceLang" class="language-selector">
                    <option value="auto">Detect language</option>
                </select>
                
                <button class="swap-button" id="swapLanguages">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                
                <select id="targetLang" class="language-selector">
                    <option value="en">English</option>
                </select>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="text-area-container">
                    <textarea 
                        id="sourceText" 
                        class="text-area" 
                        placeholder="Type or paste text here..."
                    > </textarea>
                    <div class="char-count" id="sourceCount">0/5000</div>
                </div>
                
                <div class="text-area-container">
                    <textarea 
                        id="translatedText" 
                        class="text-area" 
                        placeholder="Translation will appear here..."
                        readonly
                    ></textarea>
                    <div class="char-count" id="targetCount">0/5000</div>
                </div>
            </div>
            
            <button id="translateBtn" class="translate-button">
                <span id="translateText">Translate Text</span>
                <span id="translateLoading" class="hidden">
                    <span class="loading"></span> Translating...
                </span>
            </button>
        </section>
    
    <script>
        class Translator {
            constructor() {
                this.languages = {
                    'af': 'Afrikaans', 'sq': 'Albanian', 'am': 'Amharic', 'ar': 'Arabic',
                    'hy': 'Armenian', 'az': 'Azerbaijani', 'eu': 'Basque', 'be': 'Belarusian',
                    'bn': 'Bengali', 'bs': 'Bosnian', 'bg': 'Bulgarian', 'ca': 'Catalan',
                    'ceb': 'Cebuano', 'ny': 'Chichewa', 'zh-cn': 'Chinese (Simplified)',
                    'zh-tw': 'Chinese (Traditional)', 'co': 'Corsican', 'hr': 'Croatian',
                    'cs': 'Czech', 'da': 'Danish', 'nl': 'Dutch', 'en': 'English',
                    'eo': 'Esperanto', 'et': 'Estonian', 'tl': 'Filipino', 'fi': 'Finnish',
                    'fr': 'French', 'fy': 'Frisian', 'gl': 'Galician', 'ka': 'Georgian',
                    'de': 'German', 'el': 'Greek', 'gu': 'Gujarati', 'ht': 'Haitian Creole',
                    'ha': 'Hausa', 'haw': 'Hawaiian', 'he': 'Hebrew', 'hi': 'Hindi',
                    'hmn': 'Hmong', 'hu': 'Hungarian', 'is': 'Icelandic', 'ig': 'Igbo',
                    'id': 'Indonesian', 'ga': 'Irish', 'it': 'Italian', 'ja': 'Japanese',
                    'jw': 'Javanese', 'kn': 'Kannada', 'kk': 'Kazakh', 'km': 'Khmer',
                    'ko': 'Korean', 'ku': 'Kurdish', 'ky': 'Kyrgyz', 'lo': 'Lao',
                    'la': 'Latin', 'lv': 'Latvian', 'lt': 'Lithuanian', 'lb': 'Luxembourgish',
                    'mk': 'Macedonian', 'mg': 'Malagasy', 'ms': 'Malay', 'ml': 'Malayalam',
                    'mt': 'Maltese', 'mi': 'Maori', 'mr': 'Marathi', 'mn': 'Mongol',
                    'my': 'Myanmar', 'ne': 'Nepali', 'no': 'Norwegian', 'ps': 'Pashto',
                    'fa': 'Persian', 'pl': 'Polish', 'pt': 'Portuguese', 'pa': 'Punjabi',
                    'ro': 'Romanian', 'ru': 'Russian', 'sm': 'Samoan', 'gd': 'Scots Gaelic',
                    'sr': 'Serbian', 'st': 'Sesotho', 'sn': 'Shona', 'sd': 'Sindhi',
                    'si': 'Sinhala', 'sk': 'Slovak', 'sl': 'Slovenian', 'so': 'Somali',
                    'es': 'Spanish', 'su': 'Sundanese', 'sw': 'Swahili', 'sv': 'Swedish',
                    'tg': 'Tajik', 'ta': 'Tamil', 'te': 'Telugu', 'th': 'Thai',
                    'tr': 'Turkish', 'uk': 'Ukrainian', 'ur': 'Urdu', 'uz': 'Uzbek',
                    'vi': 'Vietnamese', 'cy': 'Welsh', 'xh': 'Xhosa', 'yi': 'Yiddish',
                    'yo': 'Yoruba', 'zu': 'Zulu', 'fil': 'Filipino'
                };
                
                this.init();
            }
            
            init() {
                this.populateLanguageSelectors();
                this.setupEventListeners();
                this.updateCharCount();
            }
            
            populateLanguageSelectors() {
                const sourceSelect = document.getElementById('sourceLang');
                const targetSelect = document.getElementById('targetLang');
                
                targetSelect.innerHTML = '';
                
                Object.entries(this.languages).forEach(([code, name]) => {
                    const option = document.createElement('option');
                    option.value = code;
                    option.textContent = name;
                    
                    targetSelect.appendChild(option.cloneNode(true));
                    
                    if (code !== 'auto') {
                        sourceSelect.appendChild(option);
                    }
                });
                
                sourceSelect.value = 'auto';
                targetSelect.value = 'en';
            }
            
            setupEventListeners() {
                document.getElementById('translateBtn').addEventListener('click', () => this.translate());
                document.getElementById('swapLanguages').addEventListener('click', () => this.swapLanguages());
                document.getElementById('sourceText').addEventListener('input', () => this.updateCharCount());
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        e.preventDefault();
                        this.translate();
                    }
                });
            }
            
            updateCharCount() {
                const sourceText = document.getElementById('sourceText').value;
                const translatedText = document.getElementById('translatedText').value;
                document.getElementById('sourceCount').textContent = `${sourceText.length}/5000`;
                document.getElementById('targetCount').textContent = `${translatedText.length}/5000`;
            }
            
            swapLanguages() {
                const sourceSelect = document.getElementById('sourceLang');
                const targetSelect = document.getElementById('targetLang');
                const sourceText = document.getElementById('sourceText');
                const translatedText = document.getElementById('translatedText');
                
                const tempLang = sourceSelect.value;
                sourceSelect.value = targetSelect.value === 'auto' ? 'en' : targetSelect.value;
                targetSelect.value = tempLang === 'auto' ? 'en' : tempLang;
                
                const tempText = sourceText.value;
                sourceText.value = translatedText.value;
                translatedText.value = tempText;
                
                this.updateCharCount();
            }
            
            async translate() {
                const sourceText = document.getElementById('sourceText').value.trim();
                if (!sourceText) {
                      return;
                }
                
                if (sourceText.length > 5000) {
                    alert('Text is too long. Maximum: 5000 characters.');
                    return;
                }
                
                const sourceLang = document.getElementById('sourceLang').value;
                const targetLang = document.getElementById('targetLang').value;
                
                const btn = document.getElementById('translateBtn');
                const btnText = document.getElementById('translateText');
                const btnLoading = document.getElementById('translateLoading');
                
                btn.disabled = true;
                btnText.classList.add('hidden');
                btnLoading.classList.remove('hidden');
                
                try {
                    const translatedText = await this.performTranslation(sourceText, sourceLang, targetLang);
                    document.getElementById('translatedText').value = translatedText;
                    document.getElementById('translatedText').classList.add('fade-in');
                    
                    setTimeout(() => {
                        document.getElementById('translatedText').classList.remove('fade-in');
                    }, 500);
                    
                } catch (error) {
                    console.error('Translation error:', error);
                    alert('Error translating. Please try again.');
                } finally {
                    btn.disabled = false;
                    btnText.classList.remove('hidden');
                    btnLoading.classList.add('hidden');
                    this.updateCharCount();
                }
            }
            
            async performTranslation(text, sourceLang, targetLang) {
                const encodedText = encodeURIComponent(text);
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&dt=rm&q=${encodedText}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Accept': 'application/json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data && data[0]) {
                        let translatedText = '';
                        data[0].forEach(item => {
                            if (item[0]) {
                                translatedText += item[0];
                            }
                        });
                        return translatedText || text;
                    }
                    
                    return text;
                    
                } catch (error) {
                    console.error('Request error:', error);
                    return await this.fallbackTranslation(text, sourceLang, targetLang);
                }
            }
            
            async fallbackTranslation(text, sourceLang, targetLang) {
                const fallbackUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`;
                
                try {
                    const response = await fetch(fallbackUrl);
                    const data = await response.json();
                    
                    if (data.responseData && data.responseData.translatedText) {
                        return data.responseData.translatedText;
                    }
                    
                    throw new Error('Alternative API failed');
                    
                } catch (error) {
                    console.error('Fallback error:', error);
                    throw new Error('Could not translate text');
                }
            }
            
            async textToSpeech(text, langCode) {
                if (!text.trim()) {
                    alert('Please provide text to convert to audio.');
                    return;
                }
                
                const encodedText = encodeURIComponent(text);
                const ttsUrl = `https://translate.google.com/translate_tts?ie=UTF-8&client=gtx&tl=${langCode}&q=${encodedText}`;
                
                try {
                    const response = await fetch(ttsUrl);
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    audio.play();
                    this.downloadAudio(audioBlob, langCode);
                    
                } catch (error) {
                    console.error('TTS error:', error);
                    alert('Could not generate audio.');
                }
            }
            
            downloadAudio(blob, langCode) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `translation_${langCode}_${Date.now()}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            const translator = new Translator();
            
            setTimeout(() => {
                translator.translate();
            }, 1000);
            
            window.translator = translator;
        });
    </script>
</body>
</html>
